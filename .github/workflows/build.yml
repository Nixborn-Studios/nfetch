name: NFetch Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            exe: nfetch
            asset: nfetch-linux

          - os: windows-latest
            exe: nfetch.exe
            asset: nfetch-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Setup vcpkg (MANIFEST MODE - FIX)
      - name: Setup vcpkg
        if: runner.os == 'Windows'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/vcpkg
          runVcpkgInstall: true

      # Linux dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build pkg-config libglib2.0-dev libchafa-dev

      # Configure
      - name: Configure CMake
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      # Build
      - name: Build
        run: |
          cmake --build build

      # Package
      - name: Package
        shell: bash
        run: |
          mkdir package
          cp build/${{ matrix.exe }} package/
          cp -r assets package/

      # GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: package/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}