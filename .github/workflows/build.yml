name: NFetch Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            exe: nfetch
            asset: nfetch-linux

          - os: windows-latest
            exe: nfetch.exe
            asset: nfetch-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # =========================
      # CACHE (Linux)
      # =========================
      - name: Cache APT packages
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/apt
          key: apt-${{ runner.os }}

      # =========================
      # LINUX DEPENDENCIES
      # =========================
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build pkg-config libglib2.0-dev libchafa-dev

      # =========================
      # MSYS2 CACHE (IMPORTANT)
      # =========================
      - name: Cache MSYS2
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            C:\msys64\var\cache\pacman\pkg
            C:\msys64\mingw64
          key: msys2-${{ runner.os }}

      # =========================
      # MSYS2 SETUP
      # =========================
      - name: Setup MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-chafa
            mingw-w64-x86_64-pkg-config

      # =========================
      # CONFIGURE
      # =========================
      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      # =========================
      # BUILD
      # =========================
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build

      - name: Build (Windows MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build

      # =========================
      # PACKAGE
      # =========================
      - name: Package
        shell: bash
        run: |
          mkdir -p package
          cp build/${{ matrix.exe }} package/ || true
          cp -r assets package/ || true

      # =========================
      # RELEASE
      # =========================
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: package/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}