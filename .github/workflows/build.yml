name: build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-build-${{ hashFiles('CMakeLists.txt', 'vendor/hwinfo/**/CMakeLists.txt', 'src/**') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - run: sudo apt-get update && sudo apt-get install -y cmake g++ pkg-config libglib2.0-dev libchafa-dev zip

      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build -j

      - run: |
          mkdir -p dist/nfetch-linux/assets
          cp build/nfetch dist/nfetch-linux/
          cp -r assets dist/nfetch-linux/
          cd dist
          zip -r nfetch-linux.zip nfetch-linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/nfetch-linux.zip

  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-build-${{ hashFiles('CMakeLists.txt', 'vendor/hwinfo/**/CMakeLists.txt', 'src/**') }}
          restore-keys: |
            ${{ runner.os }}-build-

      # POPRAWKA WINDOWS: Dodano kompilator mingw-w64-x86_64-gcc do instalacji
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-chafa
            mingw-w64-x86_64-pkg-config
            zip

      - name: Configure and Build
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j

      - name: Package
        shell: msys2 {0}
        run: |
          mkdir -p dist/nfetch-windows/assets
          cp build/nfetch.exe dist/nfetch-windows/ || true
          cp build/nfetch_installer.exe dist/nfetch-windows/ || true
          cp -r assets dist/nfetch-windows/
          cd dist
          zip -r nfetch-windows.zip nfetch-windows

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/nfetch-windows.zip

  release:
    needs: [linux, windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/linux/nfetch-linux.zip
            dist/windows/nfetch-windows.zip