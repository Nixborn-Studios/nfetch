name: NFetch Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            exe: nfetch
            asset: nfetch-linux

          - os: windows-latest
            exe: nfetch.exe
            asset: nfetch-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Linux dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build pkg-config libglib2.0-dev libchafa-dev

      # Windows: setup vcpkg manually (NO run-vcpkg)
      - name: Setup vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=$env:GITHUB_WORKSPACE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      # Configure CMake
      - name: Configure CMake
        shell: pwsh
        run: |
          if ("${{ runner.os }}" -eq "Windows") {
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release `
              -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          } else {
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          }

      # Build
      - name: Build project
        run: |
          cmake --build build

      # Package
      - name: Package
        shell: bash
        run: |
          mkdir package
          cp build/${{ matrix.exe }} package/
          cp -r assets package/

      # GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: package/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}