name: build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: deps
        run: sudo apt-get update && sudo apt-get install -y cmake g++ pkg-config libglib2.0-dev libchafa-dev zip

      - name: build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j

      - name: package
        run: |
          mkdir -p dist/nfetch-linux/assets
          cp build/nfetch dist/nfetch-linux/ || true
          cp -r assets dist/nfetch-linux/ || true
          cd dist
          zip -r nfetch-linux.zip nfetch-linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/nfetch-linux.zip

  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: install
        run: choco install cmake ninja zip

      - name: build
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j

      - name: package
        shell: bash
        run: |
          mkdir -p dist/nfetch-windows/assets

          cp build/nfetch.exe dist/nfetch-windows/ || true
          cp build/Release/nfetch.exe dist/nfetch-windows/ || true

          cp build/nfetch_installer.exe dist/nfetch-windows/ || true
          cp build/Release/nfetch_installer.exe dist/nfetch-windows/ || true

          cp -r assets dist/nfetch-windows/

          cd dist
          7z a nfetch-windows.zip nfetch-windows

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/nfetch-windows.zip

  release:
    needs: [linux, windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux

      - uses: actions/download-artifact@v4
        with:
          name: windows

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nfetch-linux.zip
            nfetch-windows.zip